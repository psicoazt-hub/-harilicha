<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LichassApp - Sistema de Ventas</title>
    <link rel="stylesheet" href="estilos.css">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
</head>
<body>
    <div class="marca-agua">PROPIEDAD DE LICHA</div>
    <div id="reloj">Cargando...</div>
    <h2 id="título-usuario">Identificación</h2>

    <div id="vista-login" class="vista activa">
        <img src="logo.png" alt="Logo Licha" class="logo">
        <input type="text" id="correo electrónico" placeholder="Usuario">
        <input type="password" id="pasar" placeholder="Contraseña">
        <button onclick="iniciarSesión()">ENTRAR</button>
    </div>

    <div id="vista-admin" class="vista">
        <h3>Panel CEO</h3>
        <div class="card">
            <input type="number" id="inv-diario" placeholder="Cargar Inventario (Kg)">
            <button onclick="aceptarInventario()">ACTUALIZAR INVENTARIO</button>
        </div>
        <button onclick="crearPerfil()">NUEVO EMPLEADO</button>
        <button onclick="registrarSalida()" class="btn-gris">CERRAR SESIÓN</button>
    </div>

    <div id="vista-empleado" class="vista">
        <div class="card">
            <h3>Venta de Tortillas</h3>
            <p>Precio: $22.00</p>
            <input type="number" id="no puedo vender" placeholder="Kilos a vender" step="0.1">
            <button onclick="cerrarVenta()">COBRAR Y REGISTRAR</button>
            <button onclick="corregirVenta()" class="btn-naranja">CORREGIR ÚLTIMA VENTA</button>
        </div>
        <div class="inventario-v">Quedan: <span id="inv-actual">0</span> Kg</div>
        <button onclick="registrarSalida()" class="btn-gris">SALIR</button>
    </div>

    <script src="app.js"></script>
</body>
</html>
