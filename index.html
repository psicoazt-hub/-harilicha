<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tortillas Licha - Punto de Venta</title>
    <link rel="stylesheet" href="estilos.css">
</head>
<body>
    <div id="login-screen" class="container">
        <img src="logo.png" alt="Logo Licha" class="logo">
        <h2>Acceso Administrativo</h2>
        <input type="text" id="usuario" placeholder="Usuario (Admin)">
        <input type="password" id="password" placeholder="Contraseña">
        <button id="btnEntrar">ENTRAR</button>
        <p id="mensajeError" style="color: red; display: none;">Datos incorrectos</p>
    </div>

    <div id="panel-ventas" class="container" style="display: none;">
        <h2>Venta de Tortillas</h2>
        <div class="info-precio">Precio por Kg: <strong id="precio-actual">$22.00</strong></div>
        <input type="number" id="kilos" placeholder="Cantidad de Kilos" step="0.1">
        <div class="total-venta">Total: <span id="total-pago">$0.00</span></div>
        <button id="btnVender" style="background-color: #2e7d32;">REGISTRAR VENTA</button>
        <button id="btnCerrar" style="background-color: #757575; margin-top: 10px;">Cerrar Sesión</button>
        
        <hr>
        <h3>Inventario de Hoy</h3>
        <p>Kilos producidos: <span id="inv-total">100</span> kg</p>
        <p>Kilos vendidos: <span id="inv-vendido">0</span> kg</p>
    </div>

    <script src="app.js"></script>
</body>
</html>
